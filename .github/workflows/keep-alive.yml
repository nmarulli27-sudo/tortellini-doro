jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping del database Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "❌ SUPABASE_URL is empty — secret missing or misnamed"
            exit 1
          fi
          echo "✅ URL secret present (length ${#SUPABASE_URL})"
          curl --fail -sS \
            "$SUPABASE_URL/rest/v1/prenotazioni?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY"
            
