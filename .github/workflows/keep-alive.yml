name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 9 */2 * *"   # ogni 2 giorni alle 9:00 (UTC)
  workflow_dispatch:          # permette di lanciarlo a mano per testare

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping del database Supabase
        run: |
          curl --fail -sS \
            "${{ secrets.SUPABASE_URL }}/rest/v1/prenotazioni?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"